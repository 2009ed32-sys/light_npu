schema_version: "1.0"
name: "Implemented APB3 and AXI4 protocol checks"
description: >-
  Rules implemented by the current SystemVerilog protocol checkers. This is
  not a complete AMBA specification rule set.

source_root: "C:/Users/2009e/OneDrive/바탕 화면/증명서/포트폴리오/npu"
implementation_files:
  checker: "tb/amba_protocol_assertions.sv"
  apb_unit_tb: "tb/tb_apb3_slave.sv"
  axi_read_tb: "tb/axi_master_dram_tb.sv"
  axi_write_tb: "tb/tb_sdp_writeback.sv"
  integration_tb: "apb_top/tb/tb_apb_top_smoke.sv"

assumptions:
  apb_zero_wait_default: true
  axi_max_outstanding_read: 1
  axi_max_outstanding_write: 1
  axi_id_order_check: false
  apb_optional_signals_present: false

rules:
  - id: "APB-001"
    protocol: "APB3"
    channel: "control"
    title: "PENABLE requires PSEL"
    severity: "error"
    check_type: "same_cycle_implication"
    trigger: "PENABLE"
    requirement: "PSEL"
    observed_signals: "PSEL,PENABLE"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      failure_message: "APB PENABLE asserted without PSEL"

  - id: "APB-002"
    protocol: "APB3"
    channel: "control"
    title: "SETUP must be followed by ACCESS"
    severity: "error"
    check_type: "next_cycle_implication"
    trigger: "PSEL && !PENABLE"
    requirement: "next(PSEL && PENABLE)"
    observed_signals: "PSEL,PENABLE"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      state: "setup_q"
      failure_message: "APB SETUP was not followed by ACCESS"

  - id: "APB-003"
    protocol: "APB3"
    channel: "control"
    title: "ACCESS must continue during wait state"
    severity: "error"
    check_type: "next_cycle_implication"
    trigger: "PSEL && PENABLE && !PREADY"
    requirement: "next(PSEL && PENABLE)"
    observed_signals: "PSEL,PENABLE,PREADY"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      state: "wait_q"
      failure_message: "APB ACCESS ended while PREADY was low"

  - id: "APB-004"
    protocol: "APB3"
    channel: "control_write"
    title: "APB request must remain stable during wait state"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "PSEL && PENABLE && !PREADY"
    stable_signals: "PADDR,PWRITE"
    conditional_stable_signals:
      condition: "PWRITE"
      signals: "PWDATA"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      state: "wait_addr_q,wait_write_q,wait_wdata_q"
      failure_message: "APB address/control or write data changed during wait state"

  - id: "APB-005"
    protocol: "APB3"
    channel: "response"
    title: "PSLVERR is valid only on a completed transfer"
    severity: "error"
    check_type: "same_cycle_implication"
    trigger: "PSLVERR"
    requirement: "PSEL && PENABLE && PREADY"
    observed_signals: "PSEL,PENABLE,PREADY,PSLVERR"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      failure_message: "APB PSLVERR asserted outside completion cycle"

  - id: "APB-006"
    protocol: "APB3"
    channel: "response"
    title: "Zero-wait slave keeps PREADY asserted in ACCESS"
    severity: "error"
    check_type: "parameterized_implication"
    enable_condition: "ZERO_WAIT == 1"
    trigger: "PSEL && PENABLE"
    requirement: "PREADY"
    observed_signals: "PSEL,PENABLE,PREADY"
    implementation:
      status: "implemented"
      checker_module: "apb3_protocol_checker"
      parameter: "ZERO_WAIT"
      failure_message: "Zero-wait APB slave deasserted PREADY"

  - id: "AXI-R-001"
    protocol: "AXI4"
    channel: "AR"
    title: "ARVALID is low immediately after reset"
    severity: "error"
    check_type: "post_reset_value"
    trigger: "first_cycle_after_ARESETn"
    requirement: "!ARVALID"
    observed_signals: "ARESETn,ARVALID"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "reset_seen_q"

  - id: "AXI-R-002"
    protocol: "AXI4"
    channel: "AR"
    title: "AR payload remains stable under backpressure"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "ARVALID && !ARREADY"
    stable_signals: "ARVALID,ARADDR,ARLEN,ARSIZE,ARBURST"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "ar_stall_q"

  - id: "AXI-R-003"
    protocol: "AXI4"
    channel: "R"
    title: "R payload remains stable under backpressure"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "RVALID && !RREADY"
    stable_signals: "RVALID,RDATA,RRESP,RLAST"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "r_stall_q"

  - id: "AXI-R-004"
    protocol: "AXI4"
    channel: "AR"
    title: "Only one read transaction may be outstanding"
    severity: "error"
    check_type: "scoreboard_limit"
    trigger: "ARVALID && ARREADY"
    requirement: "!read_active_q"
    limit: 1
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "read_active_q"

  - id: "AXI-R-005"
    protocol: "AXI4"
    channel: "AR"
    title: "Read burst must not cross a 4KB boundary"
    severity: "error"
    check_type: "address_range"
    trigger: "ARVALID && ARREADY"
    requirement: "ARADDR[11:0] + ((ARLEN + 1) << ARSIZE) <= 4096"
    observed_signals: "ARADDR,ARLEN,ARSIZE"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      helper: "crosses_4k"

  - id: "AXI-R-006"
    protocol: "AXI4"
    channel: "R"
    title: "Read data requires an active read request"
    severity: "error"
    check_type: "scoreboard_dependency"
    trigger: "RVALID && RREADY"
    requirement: "read_active_q"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "read_active_q"

  - id: "AXI-R-007"
    protocol: "AXI4"
    channel: "R"
    title: "RLAST position matches ARLEN"
    severity: "error"
    check_type: "beat_count"
    trigger: "RVALID && RREADY"
    requirement: "RLAST == (read_beat_q == active_arlen_q)"
    observed_signals: "ARLEN,RVALID,RREADY,RLAST"
    implementation:
      status: "implemented"
      checker_module: "axi_read_protocol_checker"
      state: "active_arlen_q,read_beat_q"

  - id: "AXI-W-001"
    protocol: "AXI4"
    channel: "AW,W"
    title: "Write VALID outputs are low immediately after reset"
    severity: "error"
    check_type: "post_reset_value"
    trigger: "first_cycle_after_ARESETn"
    requirement: "!AWVALID && !WVALID"
    observed_signals: "ARESETn,AWVALID,WVALID"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "reset_seen_q"

  - id: "AXI-W-002"
    protocol: "AXI4"
    channel: "AW"
    title: "AW payload remains stable under backpressure"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "AWVALID && !AWREADY"
    stable_signals: "AWVALID,AWADDR,AWLEN,AWSIZE,AWBURST"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "aw_stall_q"

  - id: "AXI-W-003"
    protocol: "AXI4"
    channel: "W"
    title: "W payload remains stable under backpressure"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "WVALID && !WREADY"
    stable_signals: "WVALID,WDATA,WSTRB,WLAST"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "w_stall_q"

  - id: "AXI-W-004"
    protocol: "AXI4"
    channel: "B"
    title: "B response remains stable under backpressure"
    severity: "error"
    check_type: "stable_while_stalled"
    trigger: "BVALID && !BREADY"
    stable_signals: "BVALID,BRESP"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "b_stall_q"

  - id: "AXI-W-005"
    protocol: "AXI4"
    channel: "AW"
    title: "Only one write transaction may be outstanding"
    severity: "error"
    check_type: "scoreboard_limit"
    trigger: "AWVALID && AWREADY"
    requirement: "!aw_seen_q"
    limit: 1
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "aw_seen_q"

  - id: "AXI-W-006"
    protocol: "AXI4"
    channel: "AW"
    title: "Write burst must not cross a 4KB boundary"
    severity: "error"
    check_type: "address_range"
    trigger: "AWVALID && AWREADY"
    requirement: "AWADDR[11:0] + ((AWLEN + 1) << AWSIZE) <= 4096"
    observed_signals: "AWADDR,AWLEN,AWSIZE"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      helper: "crosses_4k"

  - id: "AXI-W-007"
    protocol: "AXI4"
    channel: "AW,W"
    title: "WLAST position matches AWLEN"
    severity: "error"
    check_type: "beat_count"
    trigger: "WVALID && WREADY && WLAST"
    requirement: "accepted_W_beats == AWLEN + 1"
    observed_signals: "AWLEN,WVALID,WREADY,WLAST"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "active_awlen_q,w_beat_count_q,w_total_count_q,wlast_seen_q"

  - id: "AXI-W-008"
    protocol: "AXI4"
    channel: "AW,W,B"
    title: "BVALID follows accepted AW and final W"
    severity: "error"
    check_type: "scoreboard_dependency"
    trigger: "BVALID"
    requirement: "aw_seen_q && wlast_seen_q"
    observed_signals: "AWVALID,AWREADY,WVALID,WREADY,WLAST,BVALID"
    implementation:
      status: "implemented"
      checker_module: "axi_write_protocol_checker"
      state: "aw_seen_q,wlast_seen_q"

