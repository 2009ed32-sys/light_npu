not_implemented:
  - id: "AXI-NI-001"
    title: "Multiple outstanding and ID ordering"
  - id: "AXI-NI-002"
    title: "FIXED and WRAP burst address progression"
  - id: "AXI-NI-003"
    title: "Address alignment"
  - id: "AXI-NI-004"
    title: "RRESP and BRESP legal encoding"
  - id: "APB-NI-001"
    title: "Long wait-state stimulus against a wait-capable DUT"
  - id: "APB-NI-002"
    title: "PSTRB, PPROT, and user-signal stability"
