  - id: "APB-REG-002"
    title: "Read-only hardware status registers"
    status: "implemented"
    testbench: "tb/tb_apb3_slave.sv"
  - id: "APB-REG-003"
    title: "Invalid and unaligned address PSLVERR"
    status: "implemented"
    testbench: "tb/tb_apb3_slave.sv"
  - id: "APB-REG-004"
    title: "Sticky errors and write-one-to-clear"
    status: "implemented"
